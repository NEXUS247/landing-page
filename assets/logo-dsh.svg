<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1280">
  <!-- Black background -->
  <rect width="1280" height="1280" fill="#000000"/>
  
  <defs>
    <!-- Blue glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Gradients for cube faces -->
    <linearGradient id="topFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#0099FF"/>
    </linearGradient>
    
    <linearGradient id="leftFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00B4FF"/>
      <stop offset="100%" stop-color="#0077FF"/>
    </linearGradient>
    
    <linearGradient id="rightFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0099FF"/>
      <stop offset="100%" stop-color="#0066FF"/>
    </linearGradient>
  </defs>

  <!-- Hexagon frame with glow -->
  <g filter="url(#glow)">
    <polygon points="640,100 900,250 900,550 640,700 380,550 380,250" 
      fill="none" 
      stroke="#00D4FF" 
      stroke-width="8"/>
    <!-- Inner hexagon -->
    <polygon points="640,150 850,270 850,530 640,650 430,530 430,270" 
      fill="none" 
      stroke="#0099FF" 
      stroke-width="3" 
      opacity="0.6"/>
  </g>

  <!-- 3D Cube -->
  <g transform="translate(640, 400)">
    <!-- Top face -->
    <polygon points="0,-80 140,-20 0,40 -140,-20" fill="url(#topFace)"/>
    
    <!-- Left face -->
    <polygon points="-140,-20 0,40 0,180 -140,120" fill="url(#leftFace)"/>
    
    <!-- Right face -->
    <polygon points="0,40 140,-20 140,120 0,180" fill="url(#rightFace)"/>
    
    <!-- D on top face -->
    <text x="0" y="-5" 
      text-anchor="middle" 
      dominant-baseline="central"
      font-family="Arial Black, Impact, sans-serif" 
      font-size="60" 
      font-weight="900" 
      fill="#000000">D</text>
    
    <!-- S on left face -->
    <g transform="rotate(30)">
      <text x="-70" y="80" 
        text-anchor="middle" 
        dominant-baseline="central"
        font-family="Arial Black, Impact, sans-serif" 
        font-size="50" 
        font-weight="900" 
        fill="#000000">S</text>
    </g>
    
    <!-- H on right face -->
    <text x="70" y="80" 
      text-anchor="middle" 
      dominant-baseline="central"
      font-family="Arial Black, Impact, sans-serif" 
      font-size="50" 
      font-weight="900" 
      fill="#000000">H</text>
  </g>
  
  <!-- Corner accents -->
  <circle cx="640" cy="100" r="8" fill="#00D4FF" filter="url(#glow)"/>
  <circle cx="900" cy="250" r="8" fill="#00D4FF" filter="url(#glow)"/>
  <circle cx="900" cy="550" r="8" fill="#00D4FF" filter="url(#glow)"/>
  <circle cx="640" cy="700" r="8" fill="#00D4FF" filter="url(#glow)"/>
  <circle cx="380" cy="550" r="8" fill="#00D4FF" filter="url(#glow)"/>
  <circle cx="380" cy="250" r="8" fill="#00D4FF" filter="url(#glow)"/>
</svg>