<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="dshGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="6" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle with subtle gradient -->
  <circle cx="250" cy="250" r="230" fill="url(#dshGrad)" opacity="0.15"/>
  <circle cx="250" cy="250" r="210" fill="url(#dshGrad)" opacity="0.1"/>
  
  <!-- DSH Text -->
  <text x="250" y="280" 
    text-anchor="middle" 
    dominant-baseline="central"
    font-family="Arial Black, Impact, sans-serif" 
    font-size="140" 
    font-weight="900" 
    fill="url(#dshGrad)"
    letter-spacing="8"
    filter="url(#shadow)">DSH</text>
  
  <!-- Subtle decorative ring -->
  <circle cx="250" cy="250" r="195" 
    fill="none" 
    stroke="url(#dshGrad)" 
    stroke-width="3" 
    opacity="0.4"/>
</svg>